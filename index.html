<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">
    <title>개굴모임</title>

<style>
    
    body {
        background-color: #f8f6e9;
        text-align: center;
        font-family: sans-serif;
        padding-top: 30px;
    }

    h1 {
        color: #4d7c4d;
    }

    button {
        font-size: 20px;
        padding: 15px;
        margin: 10px;
        border-radius: 15px;
        border: none;
        background-color: white;
        cursor: pointer;
    }
#weekdays {
    display: grid;
    grid-template-columns: repeat(7, 140px);
    justify-content: center;
    margin-bottom: 5px;
    font-weight: bold;
}

#weekdays div {
    text-align: center;
}
    button:hover {
        transform: scale(1.1);
    }
    table {
    margin: auto;
    border-collapse: collapse;
}

td {
    width: 120px;
    height: 120px;
    border: 1px solid #999;
    vertical-align: top;
    padding: 10px;
    cursor: pointer;
    border-radius: 10px;
}

td:hover {
    background-color: #f0f0f0;
}
#month-header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
}

#month-header button {
    padding: 10px 15px;
    font-size: 18px;
}

#month-header h2 {
    margin: 0;
    color: #4d7c4d;
}
#best-day {
    color: #4d7c4d;
    margin: 15px 0;
}
.best-day-cell {
    background-color: #91e078;
    border: 3px solid #6db56d;
}

.good-day-cell {
    background-color: #73bbff;
    border: 3px solid #4d80e0;
}

.maybe-day-cell {
    background-color: #ffc578;
    border: 3px solid #ffa052;
}
</style>
</head>
<body>
    
<h1>🐸 개굴모임</h1>
<div id="month-header">
    <button onclick="previousMonth()">◀</button>
    <h2 id="month-title">📅 2026년 7월</h2>
    <button onclick="nextMonth()">▶</button>
</div>
<button onclick="selectCharacter('🐱')">🐱 고양이</button>

<button onclick="selectCharacter('🐻')">🐻 곰</button>

<button onclick="selectCharacter('🍅')">🍅 토마토</button>

<button onclick="selectCharacter('🦎')">🦎 도마뱀</button>


<h2 id="selected">
    선택된 캐릭터 : 없음
</h2>
<h3 id="best-day"></h3>

<div id="weekdays">
    <div>일</div>
    <div>월</div>
    <div>화</div>
    <div>수</div>
    <div>목</div>
    <div>금</div>
    <div>토</div>
</div>

<div id="calendar"></div>

<script>
let currentMonth = 7;
let currentYear = 2026;
const monthNames = [
    "",
    "1월", "2월", "3월", "4월",
    "5월", "6월", "7월", "8월",
    "9월", "10월", "11월", "12월"
];
let selectedCharacter = "";

let stickers = {};

const savedData = localStorage.getItem("stickers");

if (savedData) {
    stickers = JSON.parse(savedData);
}

function selectCharacter(character) {
    selectedCharacter = character;

    document.getElementById("selected").innerText =
        "선택된 캐릭터 : " + character;
}

function addSticker(day) {

    if (selectedCharacter === "") {
        alert("캐릭터를 먼저 선택하세요!");
        return;
    }

    let dateKey =
    `${currentYear}-${currentMonth}-${day}`;

if (!stickers[dateKey]) {
    stickers[dateKey] = [];
}

let dayStickers = stickers[dateKey];

    if (dayStickers.includes(selectedCharacter)) {

        dayStickers.splice(
            dayStickers.indexOf(selectedCharacter),
            1
        );

    } else {

        dayStickers.push(selectedCharacter);

    }
localStorage.setItem(
    "stickers",
    JSON.stringify(stickers)
);
    renderCalendar();
}
function updateMonthTitle() {

    document.getElementById("month-title").innerText =
        `📅 ${currentYear}년 ${currentMonth}월`;

}

function nextMonth() {

    currentMonth++;

    if(currentMonth > 12) {
        currentMonth = 1;
        currentYear++;
    }

    updateMonthTitle();
     renderCalendar();
}


function previousMonth() {

    currentMonth--;

    if(currentMonth < 1) {
        currentMonth = 12;
        currentYear--;
    }

    updateMonthTitle();
    renderCalendar();
}
function renderCalendar() {

    let html = "<table>";

    let day = 1;
    let startDay = new Date(currentYear, currentMonth - 1, 1).getDay();
let daysInMonth =
    new Date(currentYear, currentMonth, 0).getDate();
    for (let row = 0; row < 5; row++) {

        html += "<tr>";

        for (let col = 0; col < 7; col++) {

            // 첫 줄 앞쪽 빈칸
            if (row === 0 && col < startDay) {

                html += "<td></td>";

            } else if (day <= daysInMonth) {

                let dateKey =
    `${currentYear}-${currentMonth}-${day}`;

let isBestDay =
    stickers[dateKey] &&
    stickers[dateKey].length === 4;
    let stickerCount =
    (stickers[dateKey] || []).length;
                html += `
                <td onclick="addSticker(${day})"
                 class="
${stickerCount === 4 ? 'best-day-cell' : ''}
${stickerCount === 3 ? 'good-day-cell' : ''}
${stickerCount === 2 ? 'maybe-day-cell' : ''}
"
                >
                    <strong>${day}일</strong><br>
                    ${(stickers[
`${currentYear}-${currentMonth}-${day}`
] || []).join(" ")}
                </td>
                `;

                day++;

            } else {

                html += "<td></td>";

            }
        }

        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("calendar").innerHTML = html;
    
let availableDays = [];

for (let day = 1; day <= daysInMonth; day++) {

    let dateKey =
        `${currentYear}-${currentMonth}-${day}`;

    if (
        stickers[dateKey] &&
        stickers[dateKey].length === 4
    ) {
        console.log(dateKey, stickers[dateKey]);
        availableDays.push(day);
    }
}

if (availableDays.length > 0) {

    document.getElementById("best-day").innerHTML =
        "🎉 모두 가능한 날짜 : " +
        availableDays.join(", ") + "일";

} else {

    document.getElementById("best-day").innerHTML =
        "아직 모두 가능한 날짜가 없어요.";

}
}

renderCalendar();
</script>
</body>
</html>
