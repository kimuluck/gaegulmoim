<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">
    <title>개굴모임</title>

<style>
    
    body {
    background-color: #f8f6e9;
    text-align: center;
    font-family: sans-serif;
    padding-top: 30px;
    margin: 0;
    padding-left: 10px;
    padding-right: 10px;
}

    h1 {
        color: #4d7c4d;
    }

    button {
        font-size: 20px;
        padding: 15px;
        margin: 10px;
        border-radius: 15px;
        border: none;
        background-color: white;
        cursor: pointer;
    }
#weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    width: 100%;
    font-weight: bold;
}

#weekdays div {
    text-align: center;
}
    button:hover {
        transform: scale(1.1);
    }
  table {
    width: 100%;
    min-width: 700px;
    border-collapse: collapse;
}
#weekdays {
    min-width: 700px;
}

#calendar-wrapper {
    overflow-x: auto;
}
td {
    width: 120px;
    height: 120px;
    border: 1px solid #999;
    vertical-align: top;
    padding: 10px;
    cursor: pointer;
    border-radius: 10px;
}

td:hover {
    background-color: #f0f0f0;
}
#month-header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
}

#month-header button {
    padding: 10px 15px;
    font-size: 18px;
}

#month-header h2 {
    margin: 0;
    color: #4d7c4d;
}
#best-day {
    color: #4d7c4d;
    margin: 15px 0;
}
.best-day-cell {
    background-color: #91e078;
    border: 3px solid #6db56d;
}

.good-day-cell {
    background-color: #73bbff;
    border: 3px solid #4d80e0;
}

.maybe-day-cell {
    background-color: #ffc578;
    border: 3px solid #ffa052;
}
@media (max-width: 768px) {

    td {
        width: 100px;
        height: 90px;
        font-size: 14px;
        padding: 4px;
    }

    th {
        width: 100px;
    }

    button {
        font-size: 18px;
        padding: 12px;
    }

    #month-title {
        font-size: 24px;
    }
}
.selected-character {
    background-color: #ff6060;
    border: 3px solid #a80000;
}
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 10px;
}
#calendar {
    width: 100%;
    overflow-x: auto;
}
th {
    width: 120px;
    height: 40px;
    font-weight: bold;
    text-align: center;
}
#reset-btn {
    background-color: #ff8c8c;
    color: white;
    font-size: 16px;
}
</style>
</head>
<body>
    
<h1>🐸 개굴모임</h1>
<div id="month-header">
    <button onclick="previousMonth()">◀</button>
    <h2 id="month-title">📅 2026년 7월</h2>
    <button onclick="nextMonth()">▶</button>
</div>
<button id="cat" onclick="selectCharacter('🐱', 'cat')">🐱</button>
<button id="bear" onclick="selectCharacter('🐻', 'bear')">🐻</button>
<button id="tomato" onclick="selectCharacter('🍅', 'tomato')">🍅</button>
<button id="lizard" onclick="selectCharacter('🦎', 'lizard')">🦎</button>

<br>

<button onclick="resetData()" id="reset-btn">
    🗑 초기화
</button>

<h3 id="best-day"></h3>

<div id="calendar"></div>

<script>
let currentMonth = 7;
let currentYear = 2026;
const monthNames = [
    "",
    "1월", "2월", "3월", "4월",
    "5월", "6월", "7월", "8월",
    "9월", "10월", "11월", "12월"
];
let selectedCharacter = "";

let stickers = {};

function selectCharacter(character, buttonId) {

    selectedCharacter = character;

    document.querySelectorAll(
        "#cat,#bear,#tomato,#lizard"
    ).forEach(btn => {
        btn.classList.remove("selected-character");
    });

    document
        .getElementById(buttonId)
        .classList.add("selected-character");
}
function addSticker(day) {

    if (selectedCharacter === "") {
        alert("캐릭터를 먼저 선택하세요!");
        return;
    }

    let dateKey =
    `${currentYear}-${currentMonth}-${day}`;

if (!stickers[dateKey]) {
    stickers[dateKey] = [];
}

let dayStickers = stickers[dateKey];

    if (dayStickers.includes(selectedCharacter)) {

        dayStickers.splice(
            dayStickers.indexOf(selectedCharacter),
            1
        );

    } else {

        dayStickers.push(selectedCharacter);

    }
saveStickers();
    renderCalendar();
}
function updateMonthTitle() {

    document.getElementById("month-title").innerText =
        `📅 ${currentYear}년 ${currentMonth}월`;

}

function nextMonth() {

    currentMonth++;

    if(currentMonth > 12) {
        currentMonth = 1;
        currentYear++;
    }

    localStorage.setItem("month", currentMonth);
localStorage.setItem("year", currentYear);

   updateMonthTitle();
loadStickers();
}


function previousMonth() {

    currentMonth--;

    if(currentMonth < 1) {
        currentMonth = 12;
        currentYear--;
    }

    localStorage.setItem("month", currentMonth);
localStorage.setItem("year", currentYear);

    updateMonthTitle();
    loadStickers();
}
function renderCalendar() {

  let html = `
<table>
<tr>
    <th>일</th>
    <th>월</th>
    <th>화</th>
    <th>수</th>
    <th>목</th>
    <th>금</th>
    <th>토</th>
</tr>
`;

    let day = 1;
    let startDay = new Date(currentYear, currentMonth - 1, 1).getDay();
let daysInMonth =
    new Date(currentYear, currentMonth, 0).getDate();
    for (let row = 0; row < 6; row++) {

        html += "<tr>";

        for (let col = 0; col < 7; col++) {

            // 첫 줄 앞쪽 빈칸
            if (row === 0 && col < startDay) {

                html += "<td></td>";

            } else if (day <= daysInMonth) {

                let dateKey =
    `${currentYear}-${currentMonth}-${day}`;

let isBestDay =
    stickers[dateKey] &&
    stickers[dateKey].length === 4;
    let stickerCount =
    (stickers[dateKey] || []).length;
                html += `
                <td onclick="addSticker(${day})"
                 class="
${stickerCount === 4 ? 'best-day-cell' : ''}
${stickerCount === 3 ? 'good-day-cell' : ''}
${stickerCount === 2 ? 'maybe-day-cell' : ''}
"
                >
                    <strong>${day}일</strong><br>
                    ${(stickers[
`${currentYear}-${currentMonth}-${day}`
] || []).join(" ")}
                </td>
                `;

                day++;

            } else {

                html += "<td></td>";

            }
        }

        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("calendar").innerHTML = html;
    
let availableDays = [];

for (let day = 1; day <= daysInMonth; day++) {

    let dateKey =
        `${currentYear}-${currentMonth}-${day}`;

    if (
        stickers[dateKey] &&
        stickers[dateKey].length === 4
    ) {
        console.log(dateKey, stickers[dateKey]);
        availableDays.push(day);
    }
}

if (availableDays.length > 0) {

    document.getElementById("best-day").innerHTML =
        "🎉 모두 가능한 날짜 : " +
        availableDays.join(", ") + "일";

} else {

    document.getElementById("best-day").innerHTML =
        "아직 모두 가능한 날짜가 없어요.";

}
}

currentMonth =
    Number(localStorage.getItem("month")) || 7;

currentYear =
    Number(localStorage.getItem("year")) || 2026;

updateMonthTitle();
renderCalendar();


function resetData() {

    if(confirm("모든 스티커를 삭제할까요?")) {

        localStorage.removeItem("stickers");
        localStorage.removeItem("month");
        localStorage.removeItem("year");

        stickers = {};

        currentMonth = 7;
        currentYear = 2026;

        updateMonthTitle();
        renderCalendar();
    }
}
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc
  } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDVIo9S5rmYqGgn03e7QN_FFiCCPHDBVIo",
  authDomain: "green-lizard.firebaseapp.com",
  projectId: "green-lizard",
  storageBucket: "green-lizard.firebasestorage.app",
  messagingSenderId: "418709683690",
  appId: "1:418709683690:web:5cd6f5b65e5935a5c10693",
  measurementId: "G-YYJ624ZQGY"
};


  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

window.db = db;
window.doc = doc;
window.getDoc = getDoc;
window.setDoc = setDoc;

window.saveStickers = async function() {
    await setDoc(
        doc(db, "calendar", "shared"),
        {
            stickers: stickers
        }
    );
};

window.loadStickers = async function() {

    const snap = await getDoc(
        doc(db, "calendar", "shared")
    );

    if (snap.exists()) {

        const data = snap.data();

        if (data.stickers) {
            stickers = data.stickers;
            renderCalendar();
        }
    }
};

loadStickers();

  window.db = db;
  window.doc = doc;
  window.getDoc = getDoc;
  window.setDoc = setDoc;
</script>
</body>
</html>
