<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>개굴모임</title>
<style>
    body {
        background-color: #f8f6e9;
        text-align: center;
        font-family: sans-serif;
        padding-top: 30px;
    }

    h1 {
        color: #4d7c4d;
    }

    button {
    font-size: 18px;
    padding: 12px;
    margin: 6px;
}
#weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    width: 100%;
    margin-bottom: 5px;
    font-weight: bold;
}

#weekdays div {
    text-align: center;
}
    button:hover {
        transform: scale(1.1);
    }
    table {
    margin: auto;
    border-collapse: collapse;
     width: 100%;
}

td {
    width: auto;
    height: 80px;
    border: 1px solid #999;
    vertical-align: top;
    padding: 5px;
    cursor: pointer;
    border-radius: 10px;
    font-size: 14px;
}

td:hover {
    background-color: #f0f0f0;
}
.calendar-container {
  width: 100%;
  overflow-x: auto;
}

.calendar {
  width: 100%;
  table-layout: fixed;
}
.character-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.calendar-wrapper {
  overflow-x: auto;
}

table {
  table-layout: fixed;
}
@media (max-width: 768px) {

    body {
        padding: 10px;
    }

    h1 {
        font-size: 28px;
    }

    td {
        height: 70px;
        padding: 3px;
        font-size: 12px;
    }

    button {
        font-size: 16px;
        padding: 10px;
        margin: 4px;
    }
}
</style>
</head>
<body>
<h1>🐸 개굴모임</h1>
<div class="character-list">

<button onclick="selectCharacter('🐱 고양이')">🐱 고양이</button>
<button onclick="selectCharacter('🐻 곰')">🐻 곰</button>
<button onclick="selectCharacter('🍅 토마토')">🍅 토마토</button>
<button onclick="selectCharacter('🦎 도마뱀')">🦎 도마뱀</button>

</div>
<h2 id="selected">
    선택된 캐릭터 : 없음
</h2>
<h2>스티커 결과</h2>
<div id="weekdays">
    <div>일</div>
    <div>월</div>
    <div>화</div>
    <div>수</div>
    <div>목</div>
    <div>금</div>
    <div>토</div>
    </div>
<div class="calendar-wrapper">
    <div id="calendar"></div>


<script>

let selectedCharacter = "";

let stickers = {};

for(let day = 1; day <= 31; day++) {
    stickers[day] = [];
}

function selectCharacter(character) {
    selectedCharacter = character;

    document.getElementById("selected").innerText =
        "선택된 캐릭터 : " + character;
}

function addSticker(day) {

    if (selectedCharacter === "") {
        alert("캐릭터를 먼저 선택하세요!");
        return;
    }

    let dayStickers = stickers[day];

    if (dayStickers.includes(selectedCharacter)) {

        dayStickers.splice(
            dayStickers.indexOf(selectedCharacter),
            1
        );

    } else {

        dayStickers.push(selectedCharacter);

    }

    renderCalendar();
}

function renderCalendar() {

    let html = "<table>";

    let day = 1;
    let startDay = 3;

    for (let row = 0; row < 6; row++) {

        html += "<tr>";
            if (row === 0) {

    for (let i = 0; i < startDay; i++) {
        html += "<td></td>";
    }

}

        for (let col = 0; col < 7; col++) {

            if (day <= 31) {

                html += `
                <td onclick="addSticker(${day})">
                    <strong>${day}일</strong><br>
                    ${stickers[day].join(" ")}
                </td>
                `;

                day++;
            }

        }

        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("calendar").innerHTML = html;
}
renderCalendar();
</script>
</body>
</html>
